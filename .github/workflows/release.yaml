name: Release

on:
  push:
    branches: [main]
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms to build'
        required: true
        type: choice
        options:
          - amd64-only
          - arm64-only
          - both
        default: 'both'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: primeintellect-ai/prime-rl

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      version: ${{ steps.vars.outputs.version }}
      full_sha: ${{ steps.vars.outputs.full_sha }}
      platforms: ${{ steps.resolve-platforms.outputs.platforms }}
    steps:
      - name: Resolve platforms
        id: resolve-platforms
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "platforms=${{ inputs.platforms }}" >> $GITHUB_OUTPUT
          else
            echo "platforms=both" >> $GITHUB_OUTPUT
          fi

      - name: Set build matrix
        id: set-matrix
        run: |
          PLATFORMS="${{ steps.resolve-platforms.outputs.platforms }}"
          if [ "$PLATFORMS" = "arm64-only" ]; then
            echo 'matrix={"include":[{"runner":"image-builder-arm-2204","platform":"linux/arm64","suffix":"arm64"}]}' >> $GITHUB_OUTPUT
          elif [ "$PLATFORMS" = "both" ]; then
            echo 'matrix={"include":[{"runner":"image-builder","platform":"linux/amd64","suffix":"amd64"},{"runner":"image-builder-arm-2204","platform":"linux/arm64","suffix":"arm64"}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"runner":"image-builder","platform":"linux/amd64","suffix":"amd64"}]}' >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: vars
        run: |
          FULL_SHA=$(git rev-parse HEAD)
          echo "full_sha=${FULL_SHA}" >> $GITHUB_OUTPUT

          if VERSION=$(git describe --tags --exact-match 2>/dev/null); then
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          else
            BRANCH_NAME=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//' | cut -c1-50)
            BASE_VERSION=$(git describe --tags --always)
            echo "version=${BASE_VERSION}-${BRANCH_NAME}" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build (${{ matrix.suffix }})
    needs: prepare
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Remove unnecessary packages
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.cuda
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-${{ matrix.suffix }}
          labels: |
            org.opencontainers.image.revision=${{ needs.prepare.outputs.full_sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Output image info
        run: |
          echo "## Build Summary (${{ matrix.suffix }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Platform** | ${{ matrix.platform }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-${{ matrix.suffix }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ steps.docker_build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY

  manifest:
    name: Create multi-arch manifest
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          PLATFORMS="${{ needs.prepare.outputs.platforms }}"

          SOURCES=""
          if [ "$PLATFORMS" != "arm64-only" ]; then
            SOURCES="$SOURCES ${IMAGE}:${VERSION}-amd64"
          fi
          if [ "$PLATFORMS" != "amd64-only" ]; then
            SOURCES="$SOURCES ${IMAGE}:${VERSION}-arm64"
          fi

          # Create version tag + latest tag for tag events
          TAGS="-t ${IMAGE}:${VERSION}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAGS="$TAGS -t ${IMAGE}:latest"
          fi

          docker buildx imagetools create $TAGS $SOURCES

      - name: Output manifest info
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "## Manifest Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Platforms** | ${{ needs.prepare.outputs.platforms }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
