name: CPU Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init public submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive -- deps/verifiers deps/renderers deps/research-environments deps/pydantic-config
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --locked
      - name: Cache HuggingFace Hub
        # The config-validation path fetches small model metadata
        # (e.g. Qwen/Qwen3-0.6B/config.json) from the Hub during tests. Without a
        # cache every run cold-fetches it and the shared Actions IP pool gets
        # 429-rate-limited by the Hub, flaking unrelated PRs. Persist the hub
        # cache so the immutable metadata is fetched at most once across runs.
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          # Stable key: the small set of test-referenced models (Qwen3-0.6B,
          # Qwen3-VL-4B) changes rarely. actions/cache never overwrites an
          # existing key, so the run-id suffix lets the cache REFRESH (a new
          # entry per run) while restore-keys reuses the latest prior cache --
          # warm after the first run, and self-healing when new models appear.
          key: hf-hub-v1-${{ github.run_id }}
          restore-keys: |
            hf-hub-v1-
      - name: Run tests
        env:
          USERNAME_CI: CI_RUNNER
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          # Set WANDB_MODE to online only if WANDB_API_KEY is available, otherwise set to offline
          # This is to allow running tests on forks without WANDB_API_KEY
          WANDB_MODE: ${{ secrets.WANDB_API_KEY && 'online' || 'offline' }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Tolerate slow/throttled Hub responses instead of failing fast (default 10s).
          HF_HUB_DOWNLOAD_TIMEOUT: "30"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PRIME_API_KEY: ${{ secrets.PRIME_API_KEY }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          PYTEST_OUTPUT_DIR: /tmp/outputs
        run: >
          PYTEST_OUTPUT_DIR=/tmp/outputs uv run pytest tests/unit -m "not gpu"
      - name: Cleanup output_dir
        run: rm -rf /tmp/outputs

  slim-configs-install:
    name: Slim install (prime-rl-configs only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Build the slim wheel
        run: uv build --wheel ./packages/prime-rl-configs --out-dir /tmp/slim-wheel
      - name: Install slim wheel from a directory with no workspace context
        # Build the wheel and install it from /tmp so uv can't discover the
        # repo's root pyproject.toml [tool.uv.sources] and silently apply
        # them. This mirrors what an external pip-only user gets.
        run: |
          uv venv --python 3.12 /tmp/slim
          cd /tmp && uv pip install --python /tmp/slim/bin/python /tmp/slim-wheel/*.whl
      - name: Verify configs import without heavy deps
        run: |
          /tmp/slim/bin/python - <<'PY'
          import sys

          from prime_rl.configs.rl import RLConfig
          from prime_rl.configs.sft import SFTConfig
          from prime_rl.configs.inference import InferenceConfig
          from prime_rl.configs.orchestrator import OrchestratorConfig
          from prime_rl.configs.trainer import TrainerConfig
          from prime_rl.configs.env_server import EnvServerConfig
          from prime_rl.utils.config import BaseConfig, find_package_resource, rgetattr, rsetattr
          from prime_rl.utils.validation import validate_shared_ckpt_config

          forbidden = ["torch", "transformers", "vllm", "wandb", "ring_flash_attn",
                       "verifiers", "prime", "datasets", "liger_kernel", "loguru"]
          leaked = [m for m in forbidden if m in sys.modules]
          if leaked:
              raise SystemExit(f"slim install leaked heavy deps into sys.modules: {leaked}")

          # Slim wheel does not ship the templates/ data dir; resolver returns None.
          assert find_package_resource("templates") is None, "templates should not be in slim wheel"
          print("slim install OK — configs import with no heavy deps loaded")
          PY
      - name: Verify a real config (with [slurm]) parses on slim install
        run: |
          /tmp/slim/bin/python - <<'PY'
          from pydantic_config import cli
          from prime_rl.configs.rl import RLConfig
          rl = cli(RLConfig, args=["@", "examples/Intellect-3.1/rl.toml"])
          assert rl.slurm is not None, "expected [slurm] in example config"
          # On slim, template_path can't be auto-resolved (heavy wheel absent) — must stay None.
          assert rl.slurm.template_path is None, f"unexpected template_path on slim: {rl.slurm.template_path}"
          print("slim parse OK")
          PY
