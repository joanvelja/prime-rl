<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rollout-viewer · transcript</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Spline+Sans+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div id="app">
  <header class="masthead">
    <div class="brand">
      <div class="title">Rollout&#8202;<em>Viewer</em></div>
      <div class="sub">RL transcript inspector</div>
    </div>
    <div class="controls">
      <div class="field">
        <label for="sel-run">run</label>
        <select id="sel-run"></select>
      </div>
      <div class="field">
        <label for="sel-sort">order&nbsp;by</label>
        <select id="sel-sort">
          <option value="reward">reward</option>
          <option value="step">step</option>
          <option value="example_id">example</option>
          <option value="winner">winner</option>
          <option value="kind">regime</option>
        </select>
      </div>
      <div class="field">
        <label for="sel-dir">dir</label>
        <select id="sel-dir">
          <option value="desc">desc</option>
          <option value="asc">asc</option>
        </select>
      </div>
      <div class="field act">
        <label>&nbsp;</label>
        <button class="btn" id="btn-refresh" title="re-pull index">refresh</button>
      </div>
      <div class="field act">
        <label>&nbsp;</label>
        <button class="btn" id="btn-setup" data-setup-toggle title="show the declared protocol / run setup">setup</button>
      </div>
      <span class="live off" id="live"><span class="dot"></span><span class="txt">connecting</span></span>
    </div>
  </header>
  <div class="body" id="body">
    <section class="list-pane" id="list-pane">
      <div class="list-head">
        <span class="h">episodes</span>
        <span class="n" id="list-count">—</span>
      </div>
      <div class="list-scroll" id="list-scroll">
        <div class="empty"><span class="big">no run loaded</span></div>
      </div>
    </section>
    <section class="inspector" id="inspector">
      <div class="ep-head" id="ep-head" hidden></div>
      <div class="deck" id="deck" hidden></div>
      <div class="detail-scroll" id="detail-scroll">
        <div class="empty"><span class="big">select an episode</span>
          <span>pick a frame from the episode list to inspect its turns</span></div>
      </div>
    </section>
  </div>
</div>
<script type="module" src="./app.js"></script>
</body>
</html>
