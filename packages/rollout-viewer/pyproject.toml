[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rollout-viewer"
version = "0.1.0"
description = "Online rollout-visualization for prime-rl: per-seat debate transcripts, KL/IS diagnostics, cross-run compare."
readme = "README.md"
requires-python = ">=3.11,<3.14"
dependencies = [
    "pydantic>=2.7",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sse-starlette>=2.1",
    "duckdb>=1.1",
    "pyarrow>=17",
    "huggingface-hub>=0.25",
    "tokenizers>=0.20",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.6", "httpx>=0.27"]

[project.scripts]
rollout-sync = "rollout_viewer.sync:main"
rollout-serve = "rollout_viewer.app:main"

[tool.uv]
preview = true
exclude-newer = "7 days"

[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/simple"
default = true
