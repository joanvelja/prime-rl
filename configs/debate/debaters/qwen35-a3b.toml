[model]
name = "Qwen/Qwen3.5-35B-A3B"

[deployment]
type = "multi_node"
gpus_per_node = 4
num_train_nodes = 4
num_infer_nodes = 1
num_infer_replicas = 12
orchestrator_on_inference = true

[trainer]
pack_samples = true
enable_router_replay = true

[trainer.model]
impl = "custom"
seq_len = 65536
attn = "flash_attention_3"
optim_cpu_offload = true
fsdp_cpu_offload = false
cp = 2
cp_style = "ulysses"
fused_lm_head_token_chunk_size = "auto"

[trainer.model.compile]

[trainer.model.ac]
freq = 1

[trainer.model.lora]
rank = 64
alpha = 128

[trainer.optim]
lr = 1e-5

[orchestrator.train.sampling]
temperature = 1.0
top_p = 0.95
repetition_penalty = 1.0
max_completion_tokens = 16384
thinking_token_budget = 8192
extra_body = { top_k = 20, min_p = 0.0, presence_penalty = 1.5 }

[inference]
gpu_memory_utilization = 0.9
enable_return_routed_experts = true
enable_lora = true
max_lora_rank = 64
max_loras = 4
max_cpu_loras = 4
enable_prefix_caching = true
enable_dbo = false

[inference.model]
max_model_len = 65536

[inference.parallel]
tp = 4
dp = 1

[inference.vllm_extra]
moe_backend = "triton"
gdn_prefill_backend = "triton"
# Text-only debate on a multimodal-capable checkpoint: skip the vision tower,
# its profiling pass, and the mm processor cache (frees memory + startup time).
language_model_only = true
skip_mm_profiling = true
mm_processor_cache_gb = 0.0
# Pair with orchestrator.max_inflight_rollouts=1200: bound per-replica serving
# concurrency while preserving the 512/16 training batch contract.
max_num_seqs = 128
max_num_batched_tokens = 131072
performance_mode = "throughput"
generation_config = "vllm"
stream_interval = 10
enable_chunked_prefill = true
