[trainer.model.compile]

[trainer.model.ac]
freq = 1

[trainer.model.lora]
rank = 64
alpha = 128

[trainer.optim]
lr = 1e-5

[orchestrator.train.sampling]
temperature = 1.0
top_p = 0.95
repetition_penalty = 1.0
max_completion_tokens = 16384
thinking_token_budget = 8192
extra_body = { top_k = 20, min_p = 0.0, presence_penalty = 1.5 }

[inference]
gpu_memory_utilization = 0.92
enable_return_routed_experts = true
enable_lora = true
max_lora_rank = 64
max_loras = 1
max_cpu_loras = 4
enable_prefix_caching = true
enable_dbo = false

[inference.model]
max_model_len = 32768

[inference.parallel]
tp = 4
dp = 1

[inference.vllm_extra]
