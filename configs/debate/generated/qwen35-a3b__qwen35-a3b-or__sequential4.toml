[deployment]
type = "multi_node"
gpus_per_node = 4
num_train_nodes = 4
num_infer_nodes = 1
num_infer_replicas = 12
orchestrator_on_inference = true

[trainer]
pack_samples = true
enable_router_replay = true

[trainer.model]
impl = "custom"
seq_len = 32768
attn = "flash_attention_3"
optim_cpu_offload = true
fsdp_cpu_offload = false
cp = 2
cp_style = "ulysses"
