[log]
level = "info"

[ckpt]
interval = 50
keep_last = 1

# Use the vLLM LoRA load lifecycle for adapter updates. This keeps training
# async while avoiding the custom NCCL adapter collective and its pause/drain
# contract; the client-side load path uses bounded fanout and long read windows
# for shared-filesystem adapter loads.
[weight_broadcast]
type = "filesystem"
keep_all = true

[orchestrator]
training_mode = "rl"
target_lag = 3
batch_size = 512
group_size = 16
# Coupled with inference.max_num_seqs (128): ~100/replica over 12 replicas.
# Keep the training batch at 512/16 while bounding async rollout admission.
max_inflight_rollouts = 1200
max_off_policy_steps = 3
dump_trajectory = false
save_full_rollouts = true
dump_failed_train_rollouts = true
dump_failed_train_trajectory = true

[orchestrator.client]
timeout = 3600

[orchestrator.renderer]
name = "auto"
preserve_all_thinking = true

[orchestrator.model.lora]
name = "debate-r64"

[orchestrator.advantage]
type = "rae"
beta = 0.9

# Length control for multi-agent debate: RAE frontier-gated linear length penalty
# (reward -= coef * scale * tokens/seq_len, applied only to the winning/frontier
# set). coef=1.0 chosen from a real-data replay of pcd4/pcd4final/simul rollouts:
# at this coef the longest-quartile winners' advantage drops ~23% with zero
# sign-flips, arresting the observed length explosion (mean +44%, p90 +50%,
# truncation 0->25% over training) without inverting the learning signal.
# Escalate toward 2-3 only if the length curve keeps climbing while the emitted
# length_penalty.sign_flipped fraction stays ~0.
[orchestrator.advantage.length_penalty]
coef = 1.0

[orchestrator.train]
num_workers = 64

[orchestrator.eval]
interval = 5
skip_first_step = false
num_examples = 55
group_size = 4
num_workers = 32
