[log]
level = "info"

[ckpt]
interval = 50
keep_last = 1

# NCCL (direct GPU->GPU collective) weight broadcast. The 4t12i receive-thread-vs-decode
# race that previously broke this is fixed (inline blocking receive on the busy-loop
# thread + dual-sided ncclCommAbort fail-fast; this branch). Validated 2026-06-28: 9
# clean syncs, mismatch_kl stable ~0.05-0.08 (= correct weights), ~26s median sync vs the
# filesystem read-storm's 60-226s tail. Filesystem path stays hardened
# (utils/client.py LORA_LOAD_MAX_CONCURRENCY + ReadError retry) as the fallback.
[weight_broadcast]
type = "nccl"
keep_all = true

[orchestrator]
training_mode = "rl"
target_lag = 3
batch_size = 512
group_size = 16
# Coupled with inference.max_num_seqs (256): ~192/replica over 12 replicas. Raising the seq cap
# without the permits is a no-op (1424/12≈119 already ≈ the old 128 cap).
max_inflight_rollouts = 2300
max_off_policy_steps = 8
dump_trajectory = false
dump_failed_train_rollouts = true
dump_failed_train_trajectory = true

[orchestrator.client]
timeout = 3600

[orchestrator.renderer]
name = "auto"
preserve_all_thinking = true

[orchestrator.model.lora]
name = "debate-r64"

[orchestrator.advantage]
type = "rae"
beta = 0.9

# Length control for multi-agent debate: RAE frontier-gated linear length penalty
# (reward -= coef * scale * tokens/seq_len, applied only to the winning/frontier
# set). coef=1.0 chosen from a real-data replay of pcd4/pcd4final/simul rollouts:
# at this coef the longest-quartile winners' advantage drops ~23% with zero
# sign-flips, arresting the observed length explosion (mean +44%, p90 +50%,
# truncation 0->25% over training) without inverting the learning signal.
# Escalate toward 2-3 only if the length curve keeps climbing while the emitted
# length_penalty.sign_flipped fraction stays ~0.
[orchestrator.advantage.length_penalty]
coef = 1.0

[orchestrator.train]
num_workers = 64

[orchestrator.eval]
interval = 5
skip_first_step = false
num_examples = 55
group_size = 4
num_workers = 32
