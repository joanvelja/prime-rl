max_steps = 500
seq_len = 4096

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[wandb]
project = "wiki-search-debug"
name = "wiki-search-4b"

[trainer.optim]
lr = 1e-5
weight_decay = 0.0

[trainer.model.lora]
rank = 8
dropout = 0.0
target_modules = [
    "q_proj",
    "k_proj",
    "v_proj",
    "o_proj",
    "gate_proj",
    "up_proj",
    "down_proj"
]

[orchestrator]
batch_size = 512
rollouts_per_example = 16
oversampling_factor = 2.0

[orchestrator.train.sampling]
max_completion_tokens = 512

[orchestrator.buffer]
online_difficulty_filtering = true

[[orchestrator.train.env]]
id = "wiki-search"

[inference.model]
tool_call_parser = "hermes"
