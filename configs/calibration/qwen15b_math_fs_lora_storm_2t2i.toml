output_dir = "/scratch/a6r/joanv.a6r/outputs/isambard/calibration/qwen15b_math_fs_lora_storm_2t2i"
max_steps = 30
seq_len = 8192

[log]
level = "info"

[wandb]
project = "gpqa-openended-debate-calibration"
name = "qwen15b-math-fs-lora-storm-2t2i"
tags = ["lora-fs-storm", "qwen15b", "math", "2t2i", "diagnostic"]

[ckpt]
interval = 100
keep_last = 1

[weight_broadcast]
type = "filesystem"
keep_all = true

[model]
name = "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"

[deployment]
type = "multi_node"
gpus_per_node = 4
num_train_nodes = 2
num_infer_nodes = 1
num_infer_replicas = 2
orchestrator_on_inference = true

[trainer]
pack_samples = true

[trainer.model]
seq_len = 8192
attn = "flash_attention_3"

[trainer.model.compile]

[trainer.model.ac]

[trainer.model.lora]
rank = 256
alpha = 512

[trainer.optim]
lr = 1e-5

[orchestrator]
batch_size = 128
group_size = 8
max_inflight_rollouts = 512
target_lag = 3
max_off_policy_steps = 3
dump_trajectory = false
save_full_rollouts = false

[orchestrator.client]
timeout = 3600

[orchestrator.model.lora]
name = "qwen15b-r256"

[orchestrator.renderer]
name = "default"
reasoning_parser = "think"

[orchestrator.train]
num_workers = 64

[orchestrator.train.sampling]
temperature = 0.6
max_completion_tokens = 4096

[[orchestrator.train.env]]
id = "math-env"
name = "hendrycks-math-sanity"
args = { dataset_name = "mikasenghaas/Sanity-Test-R1D-1.5B", dataset_subset = "default", math_verify_max_workers = 128, math_verify_timeout = 60 }

[inference]
gpu_memory_utilization = 0.9
enable_lora = true
max_lora_rank = 256
max_loras = 4
max_cpu_loras = 4
enable_prefix_caching = true

[inference.model]
max_model_len = 8192

[inference.parallel]
tp = 4
dp = 1

[inference.vllm_extra]
max_num_seqs = 128
max_num_batched_tokens = 32768
performance_mode = "throughput"
generation_config = "vllm"
stream_interval = 10
enable_chunked_prefill = true
