env_id = "omni_math2_singleturn"
model = "allenai/Olmo-3-7B-Instruct-DPO"
output_dir = "outputs/baselines/omni-math2-olmo3-perfectible-40r"
protocol = "maj_at_n"
dataset = "omni_math2_train_excluding_baseline600"
seed = 42
num_examples = 3828
rollouts_per_example = 40
# max_concurrency bumped to 1536 for short-output perfectible extraction.
# This is deliberately higher than the long-RLVR-eval default of 512. If live
# output lengths look like RLVR p95/max tails, lower this back to 512-1024.
max_concurrency = 1536
score_max_concurrency = 1536
max_retries = 1
ks = [1, 2, 4, 8, 16, 32, 40]
success_threshold = 1.0
api_key_var = "VLLM_API_KEY"
api_profile = "vllm_permissive"
verifiers_path = "/projects/a6r/joanv.a6r/tmp/verifiers-hf-task-envs"
env_paths = ["environments/omni_math2_singleturn"]
progress = "none"

[env_args]
dataset_name = "json"
data_files = "benchmarks/datasets/omni_math2/omni_math2_train_excluding_baseline600_seed42.jsonl"
dataset_split = "train"
question_key = "problem"
answer_key = "answer"
example_id_key = "id"
task_name = "omni_math2"
info_keys = [
  "domain",
  "difficulty",
  "source",
  "tags",
]
prompts_ref = "configs/baselines/omni_math2_prompt_pack.yaml"
prompt_role = "debater_a"
prompt_phase = "propose"
use_judge_fallback = true
judge_base_url = "https://api.openai.com/v1"
judge_api_key_var = "OPENAI_API_KEY"
judge_model = "gpt-5.4-mini"
judge_prompt_pack = "default"
judge_prompt_kind = "grader"
judge_sampling_args = { temperature = 0, max_completion_tokens = 64 }
judge_cache_enabled = true
judge_cache_size = 100000
judge_max_retries = 2
judge_retry_delay_s = 0.5
judge_persistent_cache_path = "outputs/baselines/judge-cache/omni-math2-olmo3-perfectible-gpt54mini.sqlite3"
judge_persistent_cache_min_samples = 1
judge_rubric_family = "omni_math2_hybrid_math_v1"
judge_variant_id = "gpt-5.4-mini_default_grader_v5_flexible-final-answer"
math_verify_timeout_seconds = 5
math_verify_max_workers = 50

[sampling]
temperature = 1.0
top_p = 0.95
max_completion_tokens = 15360

[launch]
mode = "srun_multinode"
nodes = 8
gpus_per_node = 4
tp = 1
dp = 4
data_parallel_size_local = 4
api_server_count = 4
port = 9800
backend_port = 9900
gpu_memory_utilization = 0.95
max_model_len = 16384
enforce_eager = false
router_extra_args = ["--max-concurrent-requests", "1536", "--queue-size", "3072", "--queue-timeout-secs", "600", "--request-timeout-secs", "3600"]
# Phase 2: prod baseline + FP8 KV cache + prefix caching (40 rollouts/problem share prompts) + stream_interval=10 (batch workload).
vllm_extra = { language_model_only = true, skip_mm_profiling = true, mm_processor_cache_gb = 0.0, max_num_seqs = 192, max_num_batched_tokens = 65536, performance_mode = "throughput", generation_config = "vllm", kv_cache_dtype = "fp8", calculate_kv_scales = true, enable_prefix_caching = true, stream_interval = 10 }
