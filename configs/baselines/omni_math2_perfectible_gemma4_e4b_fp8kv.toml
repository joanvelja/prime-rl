env_id = "omni_math2_singleturn"
model = "google/gemma-4-E4B-it"
output_dir = "outputs/baselines/omni-math2-gemma4-e4b-perfectible-40r"
protocol = "maj_at_n"
dataset = "omni_math2_train_excluding_baseline600"
seed = 42
num_examples = 3828
rollouts_per_example = 40
# max_concurrency bumped to 4096 per 2026-05-13 BOTEC. With 8 nodes x 4 GPUs,
# active/GPU≈128, still below the E4B bf16-KV B*≈200 and well below KV capacity.
max_concurrency = 4096
score_max_concurrency = 4096
max_retries = 1
ks = [1, 2, 4, 8, 16, 32, 40]
success_threshold = 1.0
api_key_var = "VLLM_API_KEY"
api_profile = "vllm_permissive"
verifiers_path = "/projects/a6r/joanv.a6r/tmp/verifiers-hf-task-envs"
env_paths = ["environments/omni_math2_singleturn"]
progress = "none"

[env_args]
dataset_name = "json"
data_files = "benchmarks/datasets/omni_math2/omni_math2_train_excluding_baseline600_seed42.jsonl"
dataset_split = "train"
question_key = "problem"
answer_key = "answer"
example_id_key = "id"
task_name = "omni_math2"
info_keys = [
  "domain",
  "difficulty",
  "source",
  "tags",
]
prompts_ref = "configs/baselines/omni_math2_prompt_pack.yaml"
prompt_role = "debater_a"
prompt_phase = "propose"
use_judge_fallback = true
judge_base_url = "https://api.openai.com/v1"
judge_api_key_var = "OPENAI_API_KEY"
judge_model = "gpt-5.4-mini"
judge_prompt_pack = "default"
judge_prompt_kind = "grader"
judge_sampling_args = { temperature = 0, max_completion_tokens = 64 }
judge_cache_enabled = true
judge_cache_size = 100000
judge_max_retries = 2
judge_retry_delay_s = 0.5
judge_persistent_cache_path = "outputs/baselines/judge-cache/omni-math2-gemma4-e4b-perfectible-gpt54mini.sqlite3"
judge_persistent_cache_min_samples = 1
judge_rubric_family = "omni_math2_hybrid_math_v1"
judge_variant_id = "gpt-5.4-mini_default_grader_v5_flexible-final-answer"
math_verify_timeout_seconds = 5
math_verify_max_workers = 50

# Sampling: paper-faithful Hendrycks Sanity (t=1.0, stochastic decode) to match OLMo3 perfectible run.
# Gemma's recommended t=0.7 is for production chat — for perfectible-subset estimation we want diversity.
[sampling]
temperature = 1.0
top_p = 0.95
max_completion_tokens = 15360

[launch]
mode = "srun_multinode"
nodes = 8
gpus_per_node = 4
tp = 1
dp = 4
data_parallel_size_local = 4
api_server_count = 4
port = 9800
backend_port = 9900
gpu_memory_utilization = 0.95
max_model_len = 16384
enforce_eager = false
router_extra_args = ["--max-concurrent-requests", "4096", "--queue-size", "8192", "--queue-timeout-secs", "600", "--request-timeout-secs", "3600"]
# Gemma 4 FP8 KV is BLOCKED at the kernel level on Hopper (vLLM 0.20.1, May 2026):
#   - TRITON_ATTN (vLLM's default for Gemma 4 due to heterogeneous head_dim=256 local/512 global):
#       q_scale assertion + SIGSEGV during memory profiling under kv_cache_dtype="fp8"
#   - FLASHINFER backend: "ValueError: head_size not supported" — FlashInfer supports
#       head_dim ∈ {64,128,256}; FA3 on Hopper supports {64,96,128,192,256}. Neither handles 512.
# The vLLM mixed-attention guard is NOT a paranoia knob — it reflects a real kernel gap.
# Fall back to bf16 KV; cost is ~2× KV memory per token (~75x concurrency at 16k ctx vs ~150x
# with FP8) — still well above our max_num_seqs=192 request budget on 96GB GH200.
# When upstream FlashAttention / FlashInfer add head_dim=512 support, re-test FP8 KV.
# language_model_only=true skips the VLM vision/audio towers — math reasoning is text-only.
vllm_extra = { language_model_only = true, skip_mm_profiling = true, mm_processor_cache_gb = 0.0, max_num_seqs = 192, max_num_batched_tokens = 65536, performance_mode = "throughput", enable_prefix_caching = true, stream_interval = 10 }
