env_id = "hf_singleturn"
model = "google/gemma-4-E4B-it"
output_dir = "outputs/baselines/zebra-puzzles-v2-eval-canonical-gemma4-k16"
protocol = "maj_at_n"
dataset = "zebra_puzzles_v2_eval_canonical"
seed = 42
num_examples = 198
rollouts_per_example = 16
max_concurrency = 64
ks = [1, 3, 5, 8, 16]
success_threshold = 1.0
api_key_var = "VLLM_API_KEY"
verifiers_path = "/projects/a6r/joanv.a6r/tmp/verifiers-hf-task-envs"
env_paths = ["/projects/a6r/joanv.a6r/tmp/verifiers-hf-task-envs/environments/hf_singleturn"]

[env_args]
dataset_name = "parquet"
data_files = [
  "hf://datasets/joanvelja/zebra-puzzles-v2/data/eval_canonical-00000-of-00005.parquet",
  "hf://datasets/joanvelja/zebra-puzzles-v2/data/eval_canonical-00001-of-00005.parquet",
  "hf://datasets/joanvelja/zebra-puzzles-v2/data/eval_canonical-00002-of-00005.parquet",
  "hf://datasets/joanvelja/zebra-puzzles-v2/data/eval_canonical-00003-of-00005.parquet",
  "hf://datasets/joanvelja/zebra-puzzles-v2/data/eval_canonical-00004-of-00005.parquet",
]
dataset_split = "train"
dataset_streaming = true
dataset_streaming_shuffle_buffer_size = 4096
dataset_columns = [
  "question_id",
  "prompt_rlvr",
  "choices",
  "truth_idx",
  "puzzle_id",
  "split",
  "grid_size",
  "render_mode",
  "question_type",
  "question_weight",
  "puzzle_hash",
  "answer",
  "target_label",
]
task_type = "mcq"
question_key = "prompt_rlvr"
choices_key = "choices"
answer_key = "truth_idx"
answer_format = "index"
example_id_key = "question_id"
shuffle_choices = false
info_keys = [
  "puzzle_id",
  "split",
  "grid_size",
  "render_mode",
  "question_type",
  "question_weight",
  "puzzle_hash",
  "answer",
  "target_label",
]

[sampling]
temperature = 0.7
top_p = 0.95
max_tokens = 8192

[launch]
mode = "local"
port = 8000
gpus = "0,1,2,3"
tp = 1
dp = 4
api_server_count = 4
gpu_memory_utilization = 0.85
max_model_len = 12288
