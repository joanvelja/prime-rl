max_steps = 10000
seq_len = 40960

[slurm]
job_name = "length-penalty"

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 3

[log]
level = "debug"

[wandb]
project = "length_penalty"

[weight_broadcast]
type = "nccl"
timeout = 12000

[ckpt]
interval = 50
keep_last = 1
keep_interval = 500
resume_step = -1

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

# --- Trainer ---

[trainer]
dist_timeout_seconds = 12000

[trainer.optim]
lr = 1e-6

[trainer.ckpt.weights]
save_format = "safetensors"
save_sharded = true

# --- Orchestrator ---

[orchestrator]
batch_size = 128
rollouts_per_example = 8
max_off_policy_steps = 4
use_token_client = true
max_inflight_rollouts = 384
tasks_per_minute = 256

[[orchestrator.env]]
id = "math-env"
max_retries = 3
num_workers = 4

[orchestrator.env.args]
dataset_name = "PrimeIntellect/INTELLECT-5-RL"
difficulty_key = "solve_rate"
min_avg_reward = 0.01
max_avg_reward = 0.99
math_verify_max_workers = 128
math_verify_timeout = 60

[orchestrator.sampling]
temperature = 1.0
max_tokens = 40960

# --- Eval ---

[orchestrator.eval]
interval = 30

[[orchestrator.eval.env]]
id = "aime2024"
rollouts_per_example = 4

[[orchestrator.eval.env]]
id = "aime2025"
rollouts_per_example = 4

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85

[inference.model]
max_model_len = 40960

[inference.parallel]
tp = 4
