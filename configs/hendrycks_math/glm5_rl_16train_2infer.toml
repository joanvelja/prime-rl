max_steps = 6
seq_len = 32768
max_async_level = 1
output_dir = "/shared/outputs/matej/glm5-hendrycks-base"

[log]
level = "debug"

[wandb]
project = "glm5-index-cache"
name = "glm5-hendrycks-base"
offline = true
shared = false

[model]
name = "zai-org/GLM-5"

[weight_broadcast]
type = "nccl"
port = 29502
timeout = 12000
quantize_in_weight_transfer = true

[deployment]
type = "multi_node"
num_train_nodes = 16
num_infer_nodes = 2
gpus_per_node = 8

[slurm]
job_name = "glm5-hm-base"
partition = "cluster"
time = "04:00:00"

[trainer]
dist_timeout_seconds = 7200

[trainer.model]
impl = "custom"
attn = "flash_attention_2"
fused_lm_head_token_chunk_size = 2048
ep = 16
optim_cpu_offload = true

[trainer.model.ac]
freq = 1

[trainer.model.compile]

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.optim]
type = "adamw"
lr = 1e-6
weight_decay = 0.1

[orchestrator]
batch_size = 256
rollouts_per_example = 8
oversampling_factor = 2
max_off_policy_steps = 8
use_token_client = true

[orchestrator.sampling]
temperature = 1.0
max_tokens = 2048

[[orchestrator.env]]
id = "math-env"
name = "hendrycks-math"
args = { dataset_name = "PrimeIntellect/Hendrycks-Math", dataset_subset = "default", math_verify_max_workers = 128, math_verify_timeout = 60 }

[orchestrator.buffer]
easy_threshold = 1.0
hard_threshold = 0.0

[inference]
enable_expert_parallel = true
enable_eplb = false
use_deep_gemm = true
gpu_memory_utilization = 0.80

[inference.model]
name = "zai-org/GLM-5-FP8"
max_model_len = 65536
tool_call_parser = "glm47"

[inference.parallel]
tp = 1
dp = 16
