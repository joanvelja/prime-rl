max_steps = 1
seq_len = 1024
output_dir = "outputs/teacher_rollout_hard_distill_smoke"

[deployment]
type = "single_node"
gpus_per_node = 2
num_train_gpus = 1
num_infer_gpus = 0

[model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT"

[trainer.loss]
type = "sft"

[trainer.optim]
lr = 1e-5

[orchestrator]
batch_size = 8
rollouts_per_example = 2

[orchestrator.sampling]
max_tokens = 64
temperature = 0.7

[orchestrator.teacher_rollout_model.client]
base_url = ["https://api.pinference.ai/api/v1"]
api_key_var = "PRIME_API_KEY"
skip_model_check = true

[orchestrator.teacher_rollout_model.model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT"

[[orchestrator.env]]
id = "reverse-text"
