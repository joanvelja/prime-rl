max_steps = 4
max_async_level = 0
seq_len = 1024
output_dir = "outputs/rl_lora_smoke"

[ckpt]
interval = 1

[deployment]
type = "single_node"
gpus_per_node = 2
num_train_gpus = 1
num_infer_gpus = 1

[model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT"

[trainer.optim]
lr = 5e-5

[trainer.model.lora]
rank = 8

[trainer.ckpt.weights]
save_adapter_separately = true

[orchestrator]
batch_size = 16
rollouts_per_example = 4

[orchestrator.model.lora]
name = "r8-smoke"

[orchestrator.sampling]
max_tokens = 128

[[orchestrator.env]]
id = "reverse-text"

[inference]
enable_lora = true
gpu_memory_utilization = 0.7
