# Ablation: base (fa3+compile+mbs=2, fp32 reduce) + reshard_after_forward=false ONLY.
# Isolates reshard from bf16 reduce. Compares to yesterday's allin (15.4s/step).
max_steps = 10
output_dir = "/scratch/a6r/joanv.a6r/outputs/sft-abl-reshard"

[model]
attn = "flash_attention_3"
reshard_after_forward = false
[model.compile]
fullgraph = true

[data]
micro_batch_size = 2

[scheduler]
warmup_steps = 2
decay_steps = 8

[ckpt]
interval = 100

[deployment]
type = "single_node"
gpus_per_node = 4
num_gpus = 4

[wandb]
project = "prime-rl-sft-smoke"
name = "abl-reshard"

[slurm]
job_name = "abl-reshard"
partition = "workq"
account = "brics.a6r"
time = "01:00:00"
project_dir = "/projects/a6r/joanv.a6r/work/prime-rl"
template_path = "/projects/a6r/joanv.a6r/work/prime-rl/configs/sft/templates/isambard_single_node_sft.sbatch.j2"
