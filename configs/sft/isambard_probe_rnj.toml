# 10-step MFU probe for rnj-1 (Gemma3-arch, ~16B on disk → ~16B bf16 params).
# LARGER than marin: 16B bf16 unsharded = 32GB per rank. At reshard=F + mbs=2,
# peak mem budget: 32GB weights + activations + opt_states may exceed 95GB.
# Starting CONSERVATIVE: keep reshard=True, mbs=2. If memory < 80% after probe,
# re-run with reshard=False.
max_steps = 10
output_dir = "/scratch/a6r/joanv.a6r/outputs/probe-rnj"

[model]
attn = "flash_attention_3"
# reshard_after_forward defaults to True (safe for larger model)

[data]
# First probe OOM'd at mbs=2 with 16B Gemma3 (step 0: 94.4/95 GiB).
# Dropping to mbs=1 for the retry; if this still fits snugly, consider AC.
micro_batch_size = 1

[scheduler]
warmup_steps = 2
decay_steps = 8

[ckpt]
interval = 100

[deployment]
type = "single_node"
gpus_per_node = 4
num_gpus = 4

[wandb]
project = "prime-rl-sft-smoke"
name = "probe-rnj"

[slurm]
job_name = "probe-rnj"
partition = "workq"
account = "brics.a6r"
time = "01:00:00"
project_dir = "/projects/a6r/joanv.a6r/work/prime-rl"
template_path = "/projects/a6r/joanv.a6r/work/prime-rl/configs/sft/templates/isambard_single_node_sft.sbatch.j2"
