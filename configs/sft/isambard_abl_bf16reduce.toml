# Ablation: base (fa3+compile+mbs=2) + reduce_dtype=bf16 ONLY. Isolates bf16 reduce.
max_steps = 10
output_dir = "/scratch/a6r/joanv.a6r/outputs/sft-abl-bf16reduce"

[model]
attn = "flash_attention_3"
reduce_dtype = "bfloat16"
[model.compile]
fullgraph = true

[data]
micro_batch_size = 2

[scheduler]
