# Discriminator: compile ON + cudagraphs OFF. If this matches no-compile perf,
# stream-capture / cudagraph overhead was the culprit of "compile hurts".
# Matches yesterday's all-in base (FA3 + compile + mbs=2, reshard=True, fp32 reduce).

max_steps = 10
output_dir = "/scratch/a6r/joanv.a6r/outputs/sft-cg-compile-nocg"

[model]
attn = "flash_attention_3"
[model.compile]
fullgraph = true

[data]
micro_batch_size = 2

[scheduler]
warmup_steps = 2
decay_steps = 8

[ckpt]
interval = 100

[deployment]
type = "single_node"
gpus_per_node = 4
num_gpus = 4

[wandb]
project = "prime-rl-sft-smoke"
name = "cg-compile-nocg"

[slurm]
job_name = "cg-compile-nocg"
partition = "workq"
account = "brics.a6r"
time = "01:00:00"
project_dir = "/projects/a6r/joanv.a6r/work/prime-rl"
template_path = "/projects/a6r/joanv.a6r/work/prime-rl/configs/sft/templates/isambard_single_node_sft.sbatch.j2"
pre_run_command = "export TORCHINDUCTOR_USE_CUDAGRAPHS=0"
