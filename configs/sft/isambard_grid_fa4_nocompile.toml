# Grid cell: mbs=2 + FA4 + no compile. FA4 is torch._dynamo.disable-wrapped; can't be compiled through.
# Tests whether FA4 (flash_attn.cute) beats FA2/FA3 on Hopper at seq_len=4096 + GQA (marin = 32 Q / 8 KV).
max_steps = 10
output_dir = "/scratch/a6r/joanv.a6r/outputs/sft-grid-fa4-nocompile"

[model]
attn = "flash_attention_4"  # alias for internal "fa4"; requires impl=custom explicitly (auto gets rejected)
impl = "custom"

[data]
micro_batch_size = 2

[scheduler]
warmup_steps = 2
decay_steps = 8

[ckpt]
interval = 100

[deployment]
type = "single_node"
gpus_per_node = 4
num_gpus = 4

[wandb]
project = "prime-rl-sft-smoke"
name = "marin-grid-fa4-nocompile"

[slurm]
job_name = "grid-fa4-nc"
partition = "workq"
account = "brics.a6r"
time = "01:00:00"
project_dir = "/projects/a6r/joanv.a6r/work/prime-rl"
template_path = "/projects/a6r/joanv.a6r/work/prime-rl/configs/sft/templates/isambard_single_node_sft.sbatch.j2"
