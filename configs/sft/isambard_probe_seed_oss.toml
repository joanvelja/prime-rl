# 10-step MFU probe for seed-oss-36b (36B DENSE, ByteDance).
# BIGGEST base by far. 36B bf16 = 72GB per rank unsharded — will NOT fit.
# MUST keep reshard=True + mbs=1. May need activation checkpointing even then.
max_steps = 10
output_dir = "/scratch/a6r/joanv.a6r/outputs/probe-seed-oss"

[model]
attn = "flash_attention_3"
# 36B dense at bf16 + mbs=1 + reshard=T still OOM'd at step 0. Adding full AC.
[model.ac]
mode = "full"

[data]
micro_batch_size = 1

[scheduler]
warmup_steps = 2
decay_steps = 8

[ckpt]
interval = 100

[deployment]
type = "single_node"
gpus_per_node = 4
num_gpus = 4

[wandb]
project = "prime-rl-sft-smoke"
name = "probe-seed-oss"

[slurm]
job_name = "probe-seed-oss"
partition = "workq"
account = "brics.a6r"
time = "01:00:00"
project_dir = "/projects/a6r/joanv.a6r/work/prime-rl"
template_path = "/projects/a6r/joanv.a6r/work/prime-rl/configs/sft/templates/isambard_single_node_sft.sbatch.j2"
