# Variant 2 of rnj probe: mbs=2 + reshard=T + selective activation checkpointing.
# Hypothesis: AC's recompute cost is outweighed by mbs=2's launch-overhead amortization.
max_steps = 10
output_dir = "/scratch/a6r/joanv.a6r/outputs/probe-rnj-ac"

[model]
attn = "flash_attention_3"
[model.ac]
mode = "selective"

[data]
micro_batch_size = 2

[scheduler]
warmup_steps = 2
decay_steps = 8

[ckpt]
interval = 100

[deployment]
type = "single_node"
gpus_per_node = 4
num_gpus = 4

[wandb]
project = "prime-rl-sft-smoke"
name = "probe-rnj-ac"

[slurm]
job_name = "probe-rnj-ac"
partition = "workq"
account = "brics.a6r"
time = "01:00:00"
project_dir = "/projects/a6r/joanv.a6r/work/prime-rl"
template_path = "/projects/a6r/joanv.a6r/work/prime-rl/configs/sft/templates/isambard_single_node_sft.sbatch.j2"
