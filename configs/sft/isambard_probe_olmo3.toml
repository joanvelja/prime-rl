# 10-step MFU probe for olmo-3-7b. Conservative: start with marin-validated
# stack (FA3 + reshard=F + mbs=2). Olmo-3 is 7B dense Llama-style; memory should
# be similar or slightly lower than marin.
max_steps = 10
output_dir = "/scratch/a6r/joanv.a6r/outputs/probe-olmo3"

[model]
attn = "flash_attention_3"
reshard_after_forward = false

[data]
# Retry with mbs=1: bf16 + mbs=2 + reshard=F was edge-OOM at step 1 (97.4% peak).
# mbs=1 halves activation memory; if we see <80%, can revisit mbs=2 + reshard=T.
micro_batch_size = 1

[scheduler]
warmup_steps = 2
decay_steps = 8

[ckpt]
interval = 100

[deployment]
type = "single_node"
gpus_per_node = 4
num_gpus = 4

[wandb]
project = "prime-rl-sft-smoke"
name = "probe-olmo3"

[slurm]
job_name = "probe-olmo3"
partition = "workq"
account = "brics.a6r"
time = "01:00:00"
project_dir = "/projects/a6r/joanv.a6r/work/prime-rl"
template_path = "/projects/a6r/joanv.a6r/work/prime-rl/configs/sft/templates/isambard_single_node_sft.sbatch.j2"
