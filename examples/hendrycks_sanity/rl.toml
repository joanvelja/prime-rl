max_steps = 5000

[wandb]
project = "hendrycks-sanity"
name = "hendrycks-sanity"

[deployment]
num_train_gpus = 4
num_infer_gpus = 4

[model]
name = "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"

[orchestrator]
batch_size = 512
group_size = 8
seq_len = 8192

[[orchestrator.train.env]]
id = "math-env" # included in lock file
args = { dataset_name = "mikasenghaas/Sanity-Test-R1D-1.5B", dataset_subset = "default" }
name = "hendrycks-math"

[orchestrator.eval]
interval = 50

[[orchestrator.eval.env]]
id = "primeintellect/aime2024"
name = "aime2024"
group_size = 32

[trainer.model]
seq_len = 16384

[inference.model]
max_model_len = 8192

# Model not in MODEL_RENDERER_MAP — opt into DefaultRenderer (apply_chat_template).
[orchestrator.renderer]
name = "default"
reasoning_parser = "think"
