output_dir = "outputs/stress-matrix/gpt-oss-20b-alphabet-sort-2x4"
clean_output_dir = true
max_steps = 10
seq_len = 2048

[model]
name = "unsloth/gpt-oss-20b-BF16"

[deployment]
type = "gpu_layout"
gpus_per_node = 4
inference_port_start = 8310
hosts = ["nid010338", "nid010339"]

[[deployment.nodes]]
trainer = [0, 1, 2, 3]

[[deployment.nodes]]
inference = [0, 1, 2, 3]

[trainer.model]
impl = "custom"
attn = "eager"
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"

[orchestrator]
batch_size = 8
group_size = 2
oversampling_factor = 1.0
pool_size = 4

[orchestrator.renderer]
name = "gpt-oss"
preserve_all_thinking = true

[orchestrator.train.sampling]
max_completion_tokens = 256

[inference]
gpu_memory_utilization = 0.75

[inference.model]
max_model_len = 2048
