output_dir = "outputs/stress-matrix/qwen3-alphabet-sort-8x4"
clean_output_dir = true
max_steps = 10
seq_len = 2048

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[deployment]
type = "gpu_layout"
gpus_per_node = 4
inference_port_start = 8100
hosts = [
  "nid010338",
  "nid010339",
  "nid010344",
  "nid010345",
  "nid010346",
  "nid010353",
  "nid010354",
  "nid010355",
]

[[deployment.nodes]]
