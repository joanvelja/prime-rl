output_dir = "outputs/stress-matrix/gemma4-e2b-it-alphabet-sort-4x4"
clean_output_dir = true
max_steps = 10
seq_len = 2048

[model]
name = "google/gemma-4-E2B-it"

[deployment]
type = "gpu_layout"
gpus_per_node = 4
inference_port_start = 8420
hosts = ["nid010338", "nid010339", "nid010344", "nid010345"]

[[deployment.nodes]]
trainer = [0, 1, 2, 3]

[[deployment.nodes]]
inference = [0, 1, 2, 3]

[[deployment.nodes]]
inference = [0, 1, 2, 3]

[[deployment.nodes]]
inference = [0, 1, 2, 3]

[trainer.model]
impl = "custom"
attn = "sdpa"
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"

[orchestrator]
batch_size = 24
group_size = 2
oversampling_factor = 1.0
pool_size = 12

[orchestrator.renderer]
name = "gemma4"

[orchestrator.train.sampling]
max_completion_tokens = 256

[inference]
gpu_memory_utilization = 0.75
language_model_only = true

[inference.model]
max_model_len = 2048
