# Parity probe — Qwen3-4B-Instruct-2507 — FULL-FT. Dense clean control; expect CLEAN.
# Self-contained (sbatch). Truncation-free sampling at rec TEMPERATURE 0.7;
# top_p/top_k stay at env defaults (1.0 / off) so the temperature-only trainer
# and vLLM compute comparable full-softmax logprobs. lr=1e-6 to sharpen the policy.
output_dir = "outputs/parity/qwen3-4b-ft"
clean_output_dir = true
max_steps = 12
seq_len = 2048

[slurm]
job_name = "parity-qwen3-4b-ft"
partition = "workq"
account = "brics.a6r"

[deployment]
type = "multi_node"
gpus_per_node = 4
num_train_nodes = 1
num_infer_nodes = 1

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[trainer.model]
impl = "custom"
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-6
weight_decay = 0.01
max_norm = 1.0
type = "adamw"

[trainer.loss]
type = "default"
dppo_mask_low = 0.2
dppo_mask_high = 0.2
adv_tau = 1.0
teacher_tau = 0.0
kl_tau = 0.001

[trainer.scheduler]
type = "constant"

[orchestrator]
batch_size = 24
group_size = 2
oversampling_factor = 1.0
pool_size = 12

[orchestrator.renderer]
name = "qwen3"
preserve_all_thinking = true

[orchestrator.train.sampling]
temperature = 0.7
max_completion_tokens = 256

[[orchestrator.train.env]]
id = "primeintellect/alphabet-sort"
name = "alphabet-sort"
args = { min_turns = 3, max_turns = 5, power_per_turn = false }

[inference]
gpu_memory_utilization = 0.75

[inference.model]
max_model_len = 2048

[inference.parallel]
tp = 4
dp = 1

[trainer.experimental.token_export]

[weight_broadcast]
type = "nccl"
