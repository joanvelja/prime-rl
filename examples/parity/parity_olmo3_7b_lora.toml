# Parity probe — Olmo-3-7B-Instruct-DPO — LoRA (rank 32). Adapter-app = class #12.
# Truncation-free sampling at Olmo rec TEMPERATURE 0.6.
output_dir = "outputs/parity/olmo3-7b-lora"
clean_output_dir = true
max_steps = 12
seq_len = 2048

[slurm]
job_name = "parity-olmo3-7b-lora"
partition = "workq"
account = "brics.a6r"

[deployment]
type = "multi_node"
gpus_per_node = 4
num_train_nodes = 1
num_infer_nodes = 1

[model]
name = "allenai/Olmo-3-7B-Instruct-DPO"

[trainer.model]
impl = "custom"
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"

[trainer.model.ac]
freq = 1

[trainer.model.lora]
rank = 32
alpha = 64

[trainer.optim]
lr = 1e-6
weight_decay = 0.01
max_norm = 1.0
type = "adamw"

[trainer.loss]
type = "default"
dppo_mask_low = 0.2
dppo_mask_high = 0.2
adv_tau = 1.0
teacher_tau = 0.0
kl_tau = 0.001

[trainer.scheduler]
type = "constant"

[orchestrator]
batch_size = 24
group_size = 2
oversampling_factor = 1.0
pool_size = 12

[orchestrator.renderer]
name = "olmo3"

[orchestrator.train.sampling]
temperature = 0.6
max_completion_tokens = 256

[[orchestrator.train.env]]
id = "primeintellect/alphabet-sort"
name = "alphabet-sort"
args = { min_turns = 3, max_turns = 5, power_per_turn = false }

[inference]
gpu_memory_utilization = 0.75

[inference.model]
max_model_len = 2048

[inference.parallel]
tp = 4
dp = 1

[trainer.experimental.token_export]

[weight_broadcast]
type = "filesystem"
