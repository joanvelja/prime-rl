seq_len = 131072

[log]
level = "debug"

[wandb]
project = "glm5-pd-disag"

[model]
name = "zai-org/GLM-5"

[weight_broadcast]
type = "nccl"
port = 29502
timeout = 12000
quantize_in_weight_transfer = true

[deployment]
type = "multi_node"
num_train_nodes = 16
num_infer_nodes = 8
gpus_per_node = 8
num_infer_replicas = 2

[inference.deployment]
type = "disaggregated"
num_prefill_nodes = 4
num_decode_nodes = 4

[slurm]
job_name = "glm5-pd-disag"


[ckpt]
interval = 100

[trainer]
dist_timeout_seconds = 7200

[trainer.model]
impl = "custom"
attn = "flash_attention_2" # dsa is skipping flash attn anyway
fused_lm_head_token_chunk_size = 2048
optim_cpu_offload = true
ep = 8

[trainer.model.ac]
freq = 1

[trainer.model.compile]

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.ckpt]
skip_optimizer = true
skip_gather_master_weights = true

[trainer.optim]
type = "adamw"
lr = 1e-6
weight_decay = 0.1


[orchestrator]
batch_size = 4096
rollouts_per_example = 16
oversampling_factor = 3
max_off_policy_steps = 16

[orchestrator.eval]
interval = 20

[[orchestrator.eval.env]]
id = "mini-swe-agent-plus"
name = "swe-bench-verified-quick"
args = { dataset_name="PrimeIntellect/SWE-Bench-Verified-Quick", max_turns = 200, cpu_cores = 2,  memory_gb = 4, disk_size_gb = 4, labels = ["mini-swe-agent-plus"], total_timeout_minutes = 720, sandbox_client_max_workers = 256, max_command_timeouts = 3, sandbox_command_timeout = 30}

[[orchestrator.filters]]
type = "gibberish"
enforce = true

[orchestrator.buffer]
easy_threshold = 1.0
hard_threshold = 0.0
seed = 42

[inference]
enable_expert_parallel = true
# we need <0.85 bc glm5 layers are too large for 0.85
gpu_memory_utilization = 0.80
enable_eplb = false
use_deep_gemm = true

[inference.model]
name = "zai-org/GLM-5-FP8"
tool_call_parser = "glm47"
